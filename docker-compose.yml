version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gestion_educativa_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gestion_educativa
      MYSQL_USER: usuario
      MYSQL_PASSWORD: contraseña
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  web:
    build: .
    container_name: gestion_educativa_api
    environment:
      DATABASE_URL: mysql://usuario:contraseña@db:3306/gestion_educativa
      FLASK_ENV: development
      JWT_SECRET_KEY: dev-secret-key-change-in-production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: flask run --host=0.0.0.0

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestion_educativa_frontend
    ports:
      - "5001:5001"
    environment:
      - API_BASE_URL=http://web:5000
    depends_on:
      - web
    volumes:
      - ./frontend:/app

volumes:
  mysql_data:
