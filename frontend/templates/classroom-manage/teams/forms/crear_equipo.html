<div id="tm-team-modal" class="glass-modal hidden" role="dialog" aria-modal="true" aria-labelledby="tm-modal-title">
  <div class="glass-card">
    <div class="glass-header">
      <h3 id="tm-modal-title">Crear Nuevo Equipo</h3>
      <button type="button" class="btn-close-custom" id="tm-team-close" aria-label="Cerrar">✕</button>
    </div>
    <p class="subtitle">Configura el equipo y asigna estudiantes del aula.</p>

    <form id="formEquipo" method="POST" action="{{ url_for('crear_equipo_aula', classroom_id=classroom_id) }}"
      novalidate>
      <input type="hidden" name="classroom_id" value="{{ classroom_id }}">
      <input type="hidden" name="token" value="{{ token }}">

      <div class="mb-3">
        <label class="form-label" for="nombre_equipo">👥 Nombre del Equipo <span class="text-danger">*</span></label>
        <input type="text" id="nombre_equipo" name="nombre_equipo" class="glass-input"
          placeholder="Ejemplo: Equipo Hipatia" required>
      </div>

      <div class="mb-3">
        <div class="glass-section-header">
          <label class="form-label mb-0">🧑‍🤝‍🧑 Miembros del equipo <span class="text-danger">*</span></label>
          <button type="button" class="btn-add-horario" id="btn-add-member">+ Agregar miembro</button>
        </div>
        <div id="miembros-list" class="glass-dynamic-list">
          <div class="glass-list-row--member">
            <select name="miembros" class="glass-input" required>
              <option value="" disabled selected>Seleccionar estudiante</option>
              {% for alumno in alumnos or [] %}
              <option value="{{ alumno.id }}">{{ alumno.username }} — {{ alumno.email }}</option>
              {% endfor %}
            </select>
            <button type="button" class="glass-btn-remove" aria-label="Eliminar miembro">✕</button>
          </div>
        </div>
        <p class="glass-field-hint">Selecciona al menos un estudiante inscripto en el aula.</p>
      </div>

      <div class="mb-3">
        <label class="form-label" for="tm-evaluation-id">📋 Evaluación <span class="text-danger">*</span></label>
        <select id="tm-evaluation-id" name="evaluation_id" class="glass-input" required>
          <option value="" disabled selected>Seleccionar evaluación</option>
          {% for evaluacion in evaluaciones or [] %}
          <option value="{{ evaluacion.id }}">{{ evaluacion.name }}</option>
          {% endfor %}
        </select>
        {% if not evaluaciones %}
        <p class="glass-field-hint">No hay evaluaciones configuradas para esta aula.</p>
        {% endif %}
      </div>

      <div class="action-buttons">
        <button type="button" class="btn-cancelar" id="tm-team-cancel-btn">Cancelar</button>
        <button type="submit" class="btn-crear" id="btnGuardarEquipo">Crear Equipo</button>
      </div>

      <div id="tm-team-toast" class="glass-toast hidden" role="status" aria-live="polite"></div>
    </form>
  </div>
</div>
