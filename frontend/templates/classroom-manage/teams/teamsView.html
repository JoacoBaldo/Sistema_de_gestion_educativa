<section class="tm-page" aria-label="Gestión de Equipos y avances">
    <header class="tm-header">
        <div>
            <h1 class="tm-title">Gestión de Equipos y avances</h1>
            <p class="tm-subtitle">Administra equipos y proyectos colaborativos</p>
        </div>
        <div class="tm-actions">
            <a class="st-btn st-btn-primary tm-btn-new" href="?vista=teams&amp;accion=nueva" id="tm-new-btn">
                <span class="st-btn-icon" aria-hidden="true">+</span>
                Nuevo Equipo
            </a>
        </div>
    </header>
    <div class="tm-toolbar" role="region" aria-label="Filtros y ordenamiento">
        <div class="st-search tm-search">
            <span class="st-search-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                    <path
                    d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"
                    stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M21 21l-4.2-4.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                </svg>
            </span>
            <input id="tm-search-input" type="search" placeholder="Buscar por nombre de equipo..." aria-label="Buscar equipos">
        </div>
    </div>
    <div class="tm-grid" id="tm-grid" aria-live="polite"></div>
    <p class="tm-empty" id="tm-empty">No hay equipos listados. El alta y listado por API no están disponibles; podés eliminar equipos existentes por ID si los conocés.</p>

    {% include 'classroom-manage/teams/forms/crear_equipo.html' %}
</section>
