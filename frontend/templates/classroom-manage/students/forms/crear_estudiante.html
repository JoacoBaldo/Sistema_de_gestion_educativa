<div id="st-student-modal" class="glass-modal hidden" role="dialog" aria-modal="true" aria-labelledby="st-student-modal-title">
  <div class="glass-card">
    <div class="glass-header">
      <h3 id="st-student-modal-title">Agregar Estudiante Existente</h3>
      <button type="button" class="btn-close-custom" id="st-student-close" aria-label="Cerrar">✕</button>
    </div>

    <p class="subtitle">Vincular un estudiante ya registrado al aula mediante su ID o email.</p>

    <form id="formEstudiante" method="POST" action="{{ url_for('agregar_estudiante_existente', classroom_id=classroom_id) }}">
      <div class="row mb-3">
        <div class="col-12">
          <label class="form-label" for="st_student_id">🆔 ID de usuario</label>
          <input type="number" id="st_student_id" name="student_id" class="glass-input" placeholder="Ej: 1234">
        </div>
      </div>

      <p class="glass-field-hint">Completá el ID o el email. Al menos uno es requerido.</p>

      <div class="row mb-3">
        <div class="col-12">
          <label class="form-label" for="st_email">📧 Correo Electrónico</label>
          <input type="email" id="st_email" name="email" class="glass-input" placeholder="ejemplo@fi.uba.ar">
        </div>
      </div>

      <div class="action-buttons">
        <button type="button" class="btn-cancelar" id="st-student-cancel-btn">Cancelar</button>
        <button type="submit" class="btn-crear" id="btnGuardarEstudiante">Agregar Estudiante</button>
      </div>

      <div id="st-student-toast" class="glass-toast hidden" role="status" aria-live="polite"></div>
    </form>
  </div>
</div>
