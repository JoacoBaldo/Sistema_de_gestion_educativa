<div id="lb-recurso-modal" class="glass-modal hidden" role="dialog" aria-modal="true" aria-labelledby="lb-modal-title">
  <div class="glass-card">
    <div class="glass-header">
      <h3 id="lb-modal-title">Subir recurso</h3>
      <button type="button" class="btn-close-custom" id="lb-modal-close" aria-label="Cerrar">✕</button>
    </div>
    <p class="subtitle" id="lb-modal-subtitle">Completa la información del material público</p>

    <form id="lb-recurso-form" novalidate>
      <input type="hidden" id="lb-edit-id" value="">
      <div class="mb-3">
        <label class="form-label" for="lb-nombre">📄 Nombre del recurso <span class="text-danger">*</span></label>
        <input type="text" id="lb-nombre" class="glass-input" placeholder="Ej. Introducción a estructuras de datos" required>
      </div>

      <div class="mb-3">
        <label class="form-label" for="lb-tipo">📁 Tipo de archivo <span class="text-danger">*</span></label>
        <select id="lb-tipo" class="glass-input" required>
          <option value="pdf">PDF</option>
          <option value="video">Video</option>
          <option value="link">Enlace</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label" for="lb-link">🔗 Link del recurso <span class="text-danger">*</span></label>
        <input type="url" id="lb-link" class="glass-input" placeholder="https://..." required>
      </div>

      <div class="action-buttons">
        <button type="button" class="btn-cancelar" id="lb-modal-cancel">Cancelar</button>
        <button type="submit" class="btn-crear" id="lb-modal-submit">Publicar</button>
      </div>
    </form>
  </div>
</div>
