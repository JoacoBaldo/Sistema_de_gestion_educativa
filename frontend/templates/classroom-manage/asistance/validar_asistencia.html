{% extends "base.html" %}

{% block title %}Registrar Asistencia - UniManage{% endblock %}

{% block styles %}
<style>
    .attendance-mobile-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding: 20px;
    }

    .glass-card-attendance {
        background: linear-gradient(145deg, rgba(251, 252, 254, 0.85), rgba(241, 245, 250, 0.85));
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 24px;
        box-shadow: 0 8px 32px rgba(160, 175, 195, 0.2);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 40px 24px;
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    .attendance-icon {
        color: #5c67f5;
        width: 72px;
        height: 72px;
        margin-bottom: 20px;
        background: rgba(92, 103, 245, 0.1);
        border-radius: 50%;
        padding: 16px;
    }

    .glass-input-code {
        background: rgba(255, 255, 255, 0.6);
        border: 2px dashed rgba(92, 103, 245, 0.4);
        border-radius: 16px;
        padding: 16px;
        font-size: 28px;
        text-align: center;
        letter-spacing: 6px;
        font-weight: 800;
        color: #2c3e50;
        width: 100%;
        margin-bottom: 30px;
        outline: none;
        user-select: none;
    }

    .glass-input-code:focus {
        border-color: rgba(92, 103, 245, 0.8);
    }

    .btn-presente {
        background: #5c67f5;
        color: white;
        border: none;
        border-radius: 14px;
        padding: 16px 24px;
        font-size: 18px;
        font-weight: 600;
        width: 100%;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 14px rgba(92, 103, 245, 0.3);
    }

    .btn-presente:hover {
        background: #4a54c4;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(92, 103, 245, 0.4);
    }

    .btn-presente:active {
        transform: scale(0.98);
    }
</style>
{% endblock %}

{% block content %}
<div class="attendance-mobile-container">
    <div class="glass-card-attendance">
        <svg class="attendance-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>

        <h2 style="margin-bottom: 8px; color: #1e293b; font-size: 24px;">¡Dar el Presente!</h2>
        <p style="color: #64748b; margin-bottom: 28px; line-height: 1.5;">
            Hola <b>{{ usuario.username }}</b>, estás a punto de registrar tu asistencia a esta clase.
        </p>

        <form method="POST" action="{{ url_for('validar_asistencia_alumno', classroom_id=classroom_id) }}">
            <label for="code"
                style="display: block; text-align: center; margin-bottom: 10px; color: #475569; font-weight: 500; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">
                Código de Sesión
            </label>

            <input type="text" id="code" name="code" class="glass-input-code" value="{{ code }}" readonly required>

            <button type="submit" class="btn-presente">
                Confirmar Asistencia
            </button>
        </form>
    </div>
</div>
{% endblock %}
