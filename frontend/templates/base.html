<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Gestión{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    {% block styles %}{% endblock %}
</head>

<body data-authenticated="{{ 'true' if user else 'false' }}">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="app-flash-stack" role="status" aria-live="polite">
        {% for category, message in messages %}
        <p class="app-flash app-flash--{{ category }}">{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% block scripts %}{% endblock %}

    <style>
        .app-flash {
            transition: opacity 0.6s ease, transform 0.6s ease, max-height 0.6s ease, padding 0.6s ease, margin 0.6s ease;
            opacity: 1;
            transform: translateY(0);
            overflow: hidden;
        }

        .flash-fade-out {
            opacity: 0 !important;
            transform: translateY(-20px) !important;
            max-height: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            margin-top: 0 !important;
            margin-bottom: 0 !important;
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const alertas = document.querySelectorAll('.app-flash');
            
            alertas.forEach(function (alerta) {
                setTimeout(function () {
                    alerta.classList.add('flash-fade-out');
                    setTimeout(function () {
                        alerta.remove();
                    }, 600);
                }, 4000);
            });
        });
    </script>

</body>

</html>
