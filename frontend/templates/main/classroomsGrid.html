{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/classroomgrid.css') }}">
{% endblock %}

{% block content %}
<div class="um-page">
    <header class="um-nav">
        <div class="um-nav__inner">
            <div class="um-brand" aria-label="UniManage">
                <div class="um-brand__row">
                    <div class="auth-logo" aria-hidden="true">
                        <svg class="auth-logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M3.5 13.5L16 7.5L28.5 13.5L16 19.5L3.5 13.5Z" fill="#1e293b"/>
                            <path d="M9 15.5V20.5C9 20.5 12 23 16 23C20 23 23 20.5 23 20.5V15.5" stroke="#334155" stroke-width="1.4" stroke-linecap="round"/>
                            <circle cx="16" cy="13.5" r="1.1" fill="#fbbf24"/>
                            <path d="M16 14.6V18.2" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
                            <ellipse cx="20.2" cy="17.8" rx="1.1" ry="1.4" fill="#fbbf24"/>
                        </svg>
                     </div>
                    <div class="um-brand__stack">
                        <div class="um-brand__logo">UniManage</div>
                        <div class="um-brand__subtitle">Sistema Académico</div>
                    </div>
                </div>
            </div>

            <div class="um-nav__right">
                <button class="um-icon-btn" type="button" aria-label="Configuración">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.04 7.04 0 0 0-1.63-.94l-.36-2.54A.5.5 0 0 0 13.9 1h-3.8a.5.5 0 0 0-.49.42l-.36 2.54c-.58.23-1.13.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 7.48a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.3.6.22l2.39-.96c.5.4 1.05.71 1.63.94l.36 2.54c.04.24.25.42.49.42h3.8c.24 0 .45-.18.49-.42l.36-2.54c.58-.23 1.13-.54 1.63-.94l2.39.96c.22.09.47 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5z" fill="currentColor"/>
                    </svg>
                </button>

                <div class="um-user">
                    <div class="um-avatar" aria-hidden="true">JP</div>
                    <div class="um-user__name">Prof. Juan Pérez</div>
                </div>

                <button class="um-icon-btn" type="button" aria-label="Cerrar sesión">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M10 17a1 1 0 0 1 0-2h5.59l-1.3-1.29a1 1 0 1 1 1.42-1.42l3 3a1 1 0 0 1 0 1.42l-3 3a1 1 0 1 1-1.42-1.42L15.59 17H10z" fill="currentColor"/>
                        <path d="M4 4a2 2 0 0 1 2-2h6a1 1 0 1 1 0 2H6v16h6a1 1 0 1 1 0 2H6a2 2 0 0 1-2-2V4z" fill="currentColor"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <section class="um-content">
        <div class="um-header">
            <div class="um-header__left">
                <h1 class="um-title">Mis Aulas</h1>
                <p class="um-subtitle">Selecciona un aula para gestionar</p>
            </div>

            <button class="um-primary-btn" type="button">+ Crear un aula</button>
        </div>

        <div id="classroomsGrid" class="um-grid" aria-label="Listado de aulas"></div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='JS/classroomgrid.js') }}"></script>
{% endblock %}
