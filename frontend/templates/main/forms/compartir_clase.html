<div id="cc-share-modal" class="glass-modal hidden" role="dialog" aria-modal="true" aria-labelledby="cc-modal-title">
  <div class="glass-card">
    <div class="glass-header">
      <h3 id="cc-modal-title">Compartir Clase</h3>
      <button type="button" class="btn-close-custom" id="cc-share-close" aria-label="Cerrar">✕</button>
    </div>
    <p class="subtitle">Selecciona el rol y genera el enlace de invitación.</p>

    <form id="shareForm" method="POST" action="{{ url_for('compartir_clase') }}" novalidate>
      <input type="hidden" id="classId" name="classId">

      <div class="mb-3">
        <label class="form-label" for="shareRol">🔐 Rol de acceso <span class="text-danger">*</span></label>
        <select id="shareRol" name="role_id" class="glass-input" required>
          {% for role in role_types %}
          <option value="{{ role.id }}">{{ role.name }}</option>
          {% endfor %}
        </select>
      </div>

      {% if join_link %}
      <div class="mb-3">
        <label class="form-label">🔗 Enlace generado</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="text" id="cc-share-link-input" class="glass-input" value="{{ join_link }}" readonly style="flex:1;">
          <button type="button" id="cc-copy-btn" class="btn-cancelar">Copiar</button>
        </div>
      </div>
      {% endif %}

      <div class="action-buttons">
        <button type="button" class="btn-cancelar" id="cc-share-cancel-btn">Cerrar</button>
        <button type="submit" class="btn-crear" id="btnCompartir">Generar enlace</button>
      </div>

      <div id="cc-share-toast" class="glass-toast hidden" role="status" aria-live="polite"></div>
    </form>
  </div>
</div>
