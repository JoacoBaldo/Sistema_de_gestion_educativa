{% extends "base.html" %}

{% block title %}Compartir Clase{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/compartir_clase.css') }}">
{% endblock %}

{% block content %}
<div class="cc-page">
    <div class="glass-card">
        <div class="glass-header">
            <h3 id="shareTitle">Compartir Clase</h3>
            <button class="btn-close-custom" type="button" data-action="back" aria-label="Volver">✕</button>
        </div>
        <p class="subtitle">Ingresa el correo de la persona a la que quieres dar acceso.</p>

        <form id="shareForm" method="POST" action="/clases/compartir">
            <input type="hidden" id="classId" name="classId">

            <div class="mb-3">
                <label class="form-label">Email del colaborador <span class="text-danger">*</span></label>
                <input type="email" id="shareEmail" name="email" placeholder="ejemplo@universidad.edu" class="glass-input" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Rol de acceso <span class="text-danger">*</span></label>
                <select id="shareRol" name="rol" class="glass-input" required>
                    <option value="Lector">Lector (solo ver)</option>
                    <option value="Editor">Editor (puede modificar)</option>
                </select>
            </div>

            <div class="action-buttons">
                <button type="button" class="btn-cancelar" data-action="back">Cancelar</button>
                <button type="submit" class="btn-crear" id="btnCompartir">Conceder Acceso</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='JS/compartir_clase.js') }}"></script>
{% endblock %}
