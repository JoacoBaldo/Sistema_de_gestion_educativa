<div id="cc-share-modal" class="glass-modal hidden" role="dialog" aria-modal="true" aria-labelledby="cc-modal-title">
  <div class="glass-card">
    <div class="glass-header">
      <h3 id="cc-modal-title">Compartir Clase</h3>
      <button type="button" class="btn-close-custom" id="cc-share-close" aria-label="Cerrar">✕</button>
    </div>
    <p class="subtitle">Ingresa el correo de la persona a la que quieres dar acceso.</p>

    <form id="shareForm" method="POST" action="/clases/compartir" novalidate>
      <input type="hidden" id="classId" name="classId">

      <div class="mb-3">
        <label class="form-label" for="shareEmail">✉️ Email del colaborador <span class="text-danger">*</span></label>
        <input type="email" id="shareEmail" name="email" placeholder="ejemplo@universidad.edu" class="glass-input" required>
      </div>

      <div class="mb-3">
        <label class="form-label" for="shareRol">🔐 Rol de acceso <span class="text-danger">*</span></label>
        <select id="shareRol" name="rol" class="glass-input" required>
          <option value="Lector">Lector (solo ver)</option>
          <option value="Editor">Editor (puede modificar)</option>
        </select>
      </div>

      <p id="cc-share-link-result" class="glass-hint" hidden role="status" style="word-break:break-all;margin-top:12px;"></p>

      <div class="action-buttons">
        <button type="button" class="btn-cancelar" id="cc-share-cancel-btn">Cancelar</button>
        <button type="submit" class="btn-crear" id="btnCompartir">Generar enlace</button>
      </div>

      <div id="cc-share-toast" class="glass-toast hidden" role="status" aria-live="polite"></div>
    </form>
  </div>
</div>
