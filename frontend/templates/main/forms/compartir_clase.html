<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Aulas - UniManage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8faff;
            font-family: 'Segoe UI', sans-serif;
            color: #333;
        }

        .aula-card {
            background: #ffffff;
            border-radius: 24px;
            border: none;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            height: 100%;
        }

        .aula-card:hover {
            transform: translateY(-5px);
        }

        .card-header-gradient {
            padding: 2rem 1.5rem;
            color: white;
            position: relative;
        }

        .bg-sistemas { background: linear-gradient(135deg, #2575fc 0%, #6a11cb 100%); }
        .bg-algoritmos { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); } 
        .bg-bases { background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%); }

        .alumnos-badge {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .card-body-custom {
            padding: 1.5rem;
        }

        .schedule-info {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1.5rem;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }

        .btn-link-custom {
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            color: #2575fc;
            transition: 0.2s;
            background: none;
            border: none;
            padding: 0;
        }

        .btn-link-custom:hover {
            color: #6a11cb;
        }

        .modal-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .glass-input {
            border-radius: 12px;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>Mis Aulas</h1>
            <p class="text-muted">Selecciona un aula para gestionar</p>
        </div>
        <button class="btn btn-primary rounded-pill px-4" style="background: #6a11cb; border: none;">
            + Crear un aula
        </button>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="aula-card">
                <div class="card-header-gradient bg-sistemas">
                    <h4 class="mb-1">Sistemas Operativos</h4>
                    <p class="small mb-3">Cátedra G</p>
                    <div class="alumnos-badge">👤 45 Alumnos</div>
                </div>
                <div class="card-body-custom">
                    <div class="schedule-info">
                        <div>🕒 Lunes 14:00-16:00</div>
                        <div>🕒 Miércoles 14:00-16:00</div>
                    </div>
                    
                    <div class="card-actions">
                        <button class="btn-link-custom" onclick="openShareModal(1, 'Sistemas Operativos')">
                            Compartir clase
                        </button>
                        <a href="/aulas/1" class="btn-link-custom">Abrir aula →</a>
                    </div>
                </div>
            </div>
        </div>
        </div>
</div>
<div class="modal fade" id="shareModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-glass p-4">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold" id="shareTitle">Compartir Clase</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-4">Ingresa el correo electrónico de la persona a la que quieres dar acceso.</p>
                
                <input type="hidden" id="modalClassId">
                <label class="small fw-bold mb-1">Email del colaborador</label>
                <input type="email" id="shareEmail" placeholder="ejemplo@universidad.edu" class="form-control glass-input">
                
                <label class="small fw-bold mb-1">Rol de acceso</label>
                <select id="shareRol" class="form-select glass-input">
                    <option value="Lector">Lector (solo ver)</option>
                    <option value="Editor">Editor (puede modificar)</option>
                </select>

                <button onclick="ejecutarCompartir()" class="btn btn-primary w-100 rounded-pill py-2 mt-3" style="background: #2575fc; border: none;">
                    Conceder Acceso
                </button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const shareModal = new bootstrap.Modal(document.getElementById('shareModal'));

    function openShareModal(id, nombre) {
        document.getElementById('modalClassId').value = id;
        document.getElementById('shareTitle').innerText = 'Compartir: ' + nombre;
        shareModal.show();
    }

    async function ejecutarCompartir() {
        const id_clase = document.getElementById('modalClassId').value;
        const email = document.getElementById('shareEmail').value;
        const rol = document.getElementById('shareRol').value;

        if(!email) return alert("Ingresa un email válido");

        const res = await fetch('/clases/compartir', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id_clase, email, rol })
        });

        if(res.ok) {
            alert(`Acceso concedido exitosamente a ${email}`);
            shareModal.hide();
            document.getElementById('shareEmail').value = '';
        } else {
            const err = await res.json();
            alert("Error: " + err.error);
        }
    }
</script>
</body>
</html>
