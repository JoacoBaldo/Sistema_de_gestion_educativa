<div id="ca-aula-modal" class="glass-modal hidden" role="dialog" aria-modal="true" aria-labelledby="ca-modal-title">
  <div class="glass-card">
    <div class="glass-header">
      <h3 id="ca-modal-title">Crear Nueva Aula</h3>
      <button type="button" class="btn-close-custom" id="ca-aula-close" aria-label="Cerrar">✕</button>
    </div>
    <p class="subtitle">Completa la información para crear un aula</p>

    <form id="formAula" method="POST" action="{{ url_for('crear_aula') }}" novalidate>
      <div class="mb-3">
        <label class="form-label" for="nombre">📖 Nombre del Aula <span class="text-danger">*</span></label>
        <input type="text" id="nombre" name="nombre" class="glass-input" placeholder="Ejemplo: Sistemas Operativos" required>
      </div>

      <div class="mb-3">
        <label class="form-label" for="catedra">👥 Cátedra <span class="text-danger">*</span></label>
        <input type="text" id="catedra" name="catedra" class="glass-input" placeholder="Ejemplo: Cátedra G" required>
      </div>

      <div class="mb-3">
        <label class="form-label" for="universidad">🏛️ Universidad <span class="text-danger">*</span></label>
        <input type="text" id="universidad" name="universidad" class="glass-input" placeholder="Ejemplo: Universidad Nacional" required>
      </div>

      <div class="mb-3">
        <label class="form-label">📅 Período Académico <span class="text-danger">*</span></label>
        {% if periodos %}
        <div class="glass-period-slider" id="ca-period-slider" role="radiogroup" aria-label="Período académico">
          {% for periodo in periodos %}
          <button type="button"
                  class="glass-period-pill {% if loop.first %}is-active{% endif %}"
                  data-period-id="{{ periodo.id }}"
                  role="radio"
                  aria-checked="{% if loop.first %}true{% else %}false{% endif %}">
            {{ periodo.name }}
          </button>
          {% endfor %}
        </div>
        <input type="hidden" name="academic_period_id" id="ca-academic-period-id"
               value="{{ periodos[0].id }}" required>
        {% else %}
        <p class="glass-field-hint">No hay períodos académicos configurados.</p>
        <input type="hidden" name="academic_period_id" id="ca-academic-period-id" value="">
        {% endif %}
      </div>

      <div class="mb-3">
        <div class="glass-section-header">
          <label class="form-label mb-0">🕒 Horarios <span class="text-danger">*</span></label>
          <button type="button" class="btn-add-horario" id="btn-add-horario">+ Agregar horario</button>
        </div>
        <div id="horarios-list" class="glass-dynamic-list">
          <div class="glass-list-row--schedule">
            <select name="dia" class="glass-input" required>
              <option value="Lunes">Lunes</option>
              <option value="Martes">Martes</option>
              <option value="Miércoles">Miércoles</option>
              <option value="Jueves">Jueves</option>
              <option value="Viernes">Viernes</option>
              <option value="Sábado">Sábado</option>
            </select>
            <input type="time" name="h_inicio" class="glass-input" value="10:00" required>
            <input type="time" name="h_fin" class="glass-input" value="12:00" required>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <button type="button" class="btn-cancelar" id="ca-aula-cancel-btn">Cancelar</button>
        <button type="submit" class="btn-crear" id="btnGuardar">Crear Aula</button>
      </div>

      <div id="ca-aula-toast" class="glass-toast hidden" role="status" aria-live="polite"></div>
    </form>
  </div>
</div>
