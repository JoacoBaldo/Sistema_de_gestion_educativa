{% extends "base.html" %}

{% block title %}Crear Aula{% endblock %}

{% block styles %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/crear_aula.css') }}">
{% endblock %}

{% block content %}
<div class="ca-page">
    <div class="glass-card">
        <div class="glass-header">
            <h3>Crear Nueva Aula</h3>
            <button class="btn-close-custom" type="button" data-action="back" aria-label="Volver">✕</button>
        </div>
        <p class="subtitle">Completa la información para crear un aula</p>

        <form id="formAula">
            <div class="mb-3">
                <label class="form-label">📖 Nombre del Aula <span class="text-danger">*</span></label>
                <input type="text" id="nombre" class="glass-input" placeholder="Ejemplo: Sistemas Operativos" required>
            </div>

            <div class="mb-3">
                <label class="form-label">👥 Cátedra <span class="text-danger">*</span></label>
                <input type="text" id="catedra" class="glass-input" placeholder="Ejemplo: Cátedra G" required>
            </div>

            <div class="mb-3">
                <label class="form-label">🏛️ Universidad <span class="text-danger">*</span></label>
                <input type="text" id="universidad" class="glass-input" placeholder="Ejemplo: Universidad Nacional" required>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label class="form-label">📅 Fecha de Inicio <span class="text-danger">*</span></label>
                    <input type="date" id="fecha_inicio" class="glass-input" required>
                </div>
                <div class="col-6">
                    <label class="form-label">📅 Fecha de Fin <span class="text-danger">*</span></label>
                    <input type="date" id="fecha_fin" class="glass-input" required>
                </div>
            </div>

            <div class="mb-3">
                <div class="horarios-header">
                    <label class="form-label mb-0">🕒 Horarios <span class="text-danger">*</span></label>
                    <button type="button" class="btn-add-horario">+ Agregar horario</button>
                </div>
                <div class="horario-row">
                    <select id="dia" class="form-select shadow-none" required>
                        <option value="Lunes">Lunes</option>
                        <option value="Martes">Martes</option>
                        <option value="Miércoles">Miércoles</option>
                        <option value="Jueves">Jueves</option>
                        <option value="Viernes">Viernes</option>
                        <option value="Sábado">Sábado</option>
                    </select>
                    <input type="time" id="h_inicio" class="form-control shadow-none" value="10:00" required>
                    <input type="time" id="h_fin" class="form-control shadow-none" value="12:00" required>
                </div>
            </div>

            <div class="action-buttons">
                <button type="button" class="btn-cancelar" data-action="back">Cancelar</button>
                <button type="submit" class="btn-crear" id="btnGuardar">Crear Aula</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='JS/crear_aula.js') }}"></script>
{% endblock %}
