name: Validaciones de Python en PR

on:
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - '**/*.py'

jobs:
  validate-python:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v4
      with:
        # Necesario para que el bot pueda hacer push
        ref: ${{ github.head_ref }}

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 
        cache: 'pip'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pytest types-python-jose
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Linter: Encuentra errores y arregla los que son automáticos (--fix)
    - name: Aplicar Ruff Linter (Auto-fix)
      run: ruff check --fix .

    # 5. Formateador: Aplica el formato (sin el flag --check)
    - name: Aplicar formato con Ruff
      run: ruff format .

    # 6. Bot que hace commit y push si Ruff cambió algún archivo
    - name: Hacer commit de los cambios de Ruff
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: auto-Ruff"

    # 7. Tipos (MyPy)
    - name: Validar tipos con MyPy
      run: mypy src/

    # 8. Pruebas (Pytest)
    - name: Ejecutar pruebas con Pytest
      run: PYTHONPATH=. pytest
