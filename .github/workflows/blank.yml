name: Validaciones de Python en PR

on:
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - '**/*.py'
      
permissions:
  contents: write
  pull-requests: write

jobs:
  validate-python:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 
        cache: 'pip'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pytest types-python-jose
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Aplicar Ruff Linter (Auto-fix)
      run: ruff check --fix .

    - name: Aplicar formato con Ruff
      run: ruff format .

    - name: Hacer commit de los cambios de Ruff
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: auto-formateo de código con Ruff 🎨"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Validar tipos con MyPy
      run: mypy src/

