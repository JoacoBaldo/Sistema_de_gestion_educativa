name: Validaciones de Python en PR

# Define qué eventos activan las validaciones
on:
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - '**/*.py' # Solo se ejecuta si cambian archivos de Python

jobs:
  validate-python:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código del PR en la máquina virtual
    - name: Descargar código
      uses: actions/checkout@v4

    # 2. Configura el entorno de Python
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 
        cache: 'pip'          # Acelera futuras ejecuciones guardando dependencias

    # 3. Instala las herramientas y dependencias del proyecto
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Validación de Estilo y Errores (Linter y Formateador)
    - name: Validar estilo con Ruff (Linter)
      run: ruff check .

    # 5. Validación de Formato
    # Nota: Recuerda correr `ruff format .` localmente y subir los cambios para que este paso pase en verde
    # si se queda colgado aquí.
    - name: Validar formato con Ruff (Format)
      run: ruff format --check .

    # 6. Validación de Tipos Estáticos
    - name: Validar tipos con MyPy
      run: mypy .

    # 7. Ejecución de Pruebas Unitarias
    # Arreglado: Se añade 'PYTHONPATH=.' para que Pytest reconozca la carpeta 'src' desde la raíz
    - name: Ejecutar pruebas con Pytest
      run: PYTHONPATH=. pytest
