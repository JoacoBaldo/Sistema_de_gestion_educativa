  # ─────────────────────────────────────────────
  # TEAMS
  # ─────────────────────────────────────────────

  /api/v1/teams:
    post:
      tags: [Teams]
      summary: Crear un equipo en el aula
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: classroom_id
          schema:
            type: integer
          description: "ID del aula (también puede enviarse en el form-data)"
          example: 42
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - miembros
              properties:
                name:
                  type: string
                  example: "Equipo Alpha"
                miembros:
                  type: array
                  items:
                    type: string
                  description: "Padrones o IDs de los miembros del equipo"
                  example: ["104532", "104533"]
                classroom_id:
                  type: integer
                  example: 42
      responses:
        "201":
          description: Equipo creado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResponse"
        "400":
          description: Datos inválidos o alumnos no encontrados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/teams/{team_id}:
    put:
      tags: [Teams]
      summary: Actualizar un equipo (nombre y/o miembros)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: team_id
          required: true
          schema:
            type: integer
          example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamUpdateRequest"
      responses:
        "200":
          description: Equipo actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResponse"
        "400":
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Equipo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Teams]
      summary: Eliminar un equipo
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: team_id
          required: true
          schema:
            type: integer
          example: 3
      responses:
        "200":
          description: Equipo eliminado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Equipo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
